# ──────────────────────────────────────────────
# Tmux Configuration — Catppuccin Mocha
# ──────────────────────────────────────────────

# ── Prefix ────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── General ───────────────────────────────────
set -g default-terminal 'tmux-256color'
set -ag terminal-overrides ',xterm-256color:RGB'
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # undercurl colors
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -g history-limit 1000000
set -g escape-time 0
set -g focus-events on
set -g detach-on-destroy off
setw -g aggressive-resize on
set -g mode-keys vi
set -gq allow-passthrough on

# ── Keybindings ───────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Split panes (current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt+arrow pane navigation (no prefix)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind -n M-h previous-window
bind -n M-l next-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Swap panes
bind > swap-pane -D
bind < swap-pane -U

# Kill pane/window
bind x kill-pane
bind X kill-window

# Session management
bind N new-session

# Popup session switcher (fzf)
bind S display-popup -E "tmux list-sessions -F '#{?session_attached,,#{session_name}}' | grep -v '^$' | fzf --reverse --header='Switch session' --preview='tmux capture-pane -ep -t {}' | xargs tmux switch-client -t"

# ── Copy Mode (vi) ───────────────────────────
bind v copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi Escape send -X cancel
bind p paste-buffer
bind P choose-buffer

# Mouse drag copy: keep scroll position (don't exit copy-mode)
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe "wl-copy"
bind -T copy-mode-vi MouseDown1Pane send -X clear-selection

# ── Pane Borders ──────────────────────────────
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

# ── Plugins (TPM) ────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'omerxx/catppuccin-tmux'

# ── Catppuccin Theme (managed by quickshell settings) ──
source-file -q ~/.config/tmux/quickshell-tmux.conf

# ── Plugin Settings ──────────────────────────
# Resurrect
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# Continuum
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Yank
set -g @yank-selection 'clipboard'
set -g @yank_action 'copy-pipe'
set -g @yank_with_mouse 'on'

# fzf-url — extract and open URLs from terminal
set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

# Thumbs — quick copy visible text (hashes, paths, IPs, etc.)
set -g @thumbs-command 'echo -n {} | wl-copy'
set -g @thumbs-upcase-command 'echo -n {} | wl-copy'

# ── Initialize TPM (keep at bottom) ──────────
run '~/.tmux/plugins/tpm/tpm'
