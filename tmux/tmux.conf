# ──────────────────────────────────────────────
# Tmux — radley-style base (radleylewis/dotfiles) + local customizations.
# Theme/top bar stay Catppuccin (quickshell-managed); structure/popups are radley's.
# ──────────────────────────────────────────────

# ── Colours ───────────────────────────────────
set -g default-terminal 'tmux-256color'
set -ag terminal-overrides ',xterm-256color:RGB'
set -as terminal-overrides ',xterm*:Tc:sitm=\E[3m'
set -as terminal-overrides ',alacritty*:Tc:sitm=\E[3m'
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # undercurl colors

# ── Prefix (local: C-Space) ───────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── General ───────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
# OFF: tmux must not emit OSC52 in addition to our explicit wl-copy, or kitty
# writes the same selection to wl-clipboard a second time (duplicate cliphist
# entry). All copy paths go through wl-copy-skip-empty.sh — see Copy Mode.
set -g set-clipboard off
set -g mouse on
set -g history-limit 1000000
set -g display-time 2000
set -g status-interval 5
set -g escape-time 0
set -g focus-events on
setw -g aggressive-resize on
set -g mode-keys vi
set -gq allow-passthrough on

# ── Keybindings ───────────────────────────────
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "󰑓 Config reloaded"

# Split panes (current path)
unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Misc window/pane ops (radley)
bind Space last-window
bind b break-pane
bind x kill-pane
bind X kill-window

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing (radley: m = zoom)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r m resize-pane -Z

# Swap panes
bind > swap-pane -D
bind < swap-pane -U

# ── Local: no-prefix navigation ───────────────
# Alt+arrow pane navigation
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Alt+h/l window navigation, Alt+1..9 jump to window
bind -n M-h previous-window
bind -n M-l next-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# ── Copy Mode (vi) — single Wayland clipboard path ───────────
# Every copy trigger pipes ONCE through wl-copy-skip-empty.sh (which no-ops on
# an empty selection so a stray click can't wipe the clipboard). Combined with
# set-clipboard off, this gives exactly one cliphist entry per copy.
set -g copy-command '~/.config/tmux/wl-copy-skip-empty.sh'
bind v copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi Escape send -X cancel
bind p paste-buffer
bind P choose-buffer

# Keyboard: y keeps the selection, Enter copies and exits
bind -T copy-mode-vi y     send -X copy-pipe "~/.config/tmux/wl-copy-skip-empty.sh"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "~/.config/tmux/wl-copy-skip-empty.sh"

# Mouse drag-select: copy on release, keep selection (so scroll still works)
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe "~/.config/tmux/wl-copy-skip-empty.sh"

# Double/triple click = word/line select + copy (root table enters copy-mode,
# copy-mode-vi table handles clicks made while already in copy-mode)
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send -X select-word \; send -X copy-pipe-and-cancel "~/.config/tmux/wl-copy-skip-empty.sh"
bind -T copy-mode-vi TripleClick1Pane select-pane \; send -X select-line \; send -X copy-pipe-and-cancel "~/.config/tmux/wl-copy-skip-empty.sh"
bind -T root DoubleClick1Pane select-pane -t = \; if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -H ; send-keys -X select-word ; run-shell -d 0.3 ; send-keys -X copy-pipe-and-cancel "~/.config/tmux/wl-copy-skip-empty.sh" }
bind -T root TripleClick1Pane select-pane -t = \; if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -H ; send-keys -X select-line ; run-shell -d 0.3 ; send-keys -X copy-pipe-and-cancel "~/.config/tmux/wl-copy-skip-empty.sh" }

# ── Pane Borders ──────────────────────────────
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

# ── Plugins (TPM) ────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'omerxx/catppuccin-tmux'

# ── Catppuccin theme / top bar (managed by quickshell settings) ──
source-file -q ~/.config/tmux/quickshell-tmux.conf

# ── Plugin Settings ──────────────────────────
# Resurrect / Continuum
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# fzf-url — extract and open URLs from terminal
set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

# Thumbs — quick copy visible text (hashes, paths, IPs, etc.)
set -g @thumbs-command 'echo -n {} | wl-copy'
set -g @thumbs-upcase-command 'echo -n {} | wl-copy'

# ── Popups (radley) ──────────────────────────
# Session list
bind w display-popup -E -b rounded -T " Sessions" -w 30% -h 50% ~/.config/tmux/scripts/tmux-menu.sh

# Scratch pad
unbind -T popup Tab
bind T display-popup -E -w 80% -h 80% ~/.config/tmux/scripts/tmux-scratch.sh
bind -T popup t send-keys t
bind -T popup q send-keys q
bind -T popup T detach
bind -T popup C-[ copy-mode

# LazyGit
bind g display-popup -d "#{pane_current_path}" -E -b none -w 81% -h 80% lazygit

# SSH menu
bind S display-popup -E -b none -w 40% -h 50% ~/.config/tmux/scripts/tmux-ssh.sh

# ── Initialize TPM (keep at bottom) ──────────
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'
run '~/.config/tmux/plugins/tpm/tpm'
