// Jimdots Zen live theme sync.
// Reads ~/.config/zen-live-theme.json and applies it without restarting Zen.

(function() {
  const globalStateKey = "__jimdotsZenThemeSync";
  const existingState = this[globalStateKey];
  if (existingState?.timer) {
    existingState.timer.cancel();
  }

  const state = this[globalStateKey] = {
    lastText: existingState?.lastText || "",
    currentSheetUri: existingState?.currentSheetUri || null,
    transitionSheetUri: existingState?.transitionSheetUri || null,
    timer: null,
    timerCallback: null,
  };

  const THEME_PATH = Services.dirsvc.get("Home", Ci.nsIFile).path + "/.config/zen-live-theme.json";
  const THEME_ID = "jimdots-zen-live-theme@local";
  const THEME_VERSION = "1.0.0";
  const BASE_URI = Services.io.newURI("resource://app/");
  const sss = Cc["@mozilla.org/content/style-sheet-service;1"]
    .getService(Ci.nsIStyleSheetService);
  const { LightweightThemeManager } = ChromeUtils.importESModule(
    "resource://gre/modules/LightweightThemeManager.sys.mjs"
  );

  function readFile(path) {
    try {
      const file = Cc["@mozilla.org/file/local;1"].createInstance(Ci.nsIFile);
      file.initWithPath(path);
      if (!file.exists()) {
        return null;
      }

      const stream = Cc["@mozilla.org/network/file-input-stream;1"]
        .createInstance(Ci.nsIFileInputStream);
      stream.init(file, 0x01, 0, 0);

      const conv = Cc["@mozilla.org/intl/converter-input-stream;1"]
        .createInstance(Ci.nsIConverterInputStream);
      conv.init(stream, "UTF-8", 0, 0);

      let chunk = {};
      let text = "";
      while (conv.readString(4096, chunk) !== 0) {
        text += chunk.value;
      }

      conv.close();
      stream.close();

      if (text === state.lastText) {
        return null;
      }

      const payload = JSON.parse(text);
      state.lastText = text;
      return payload;
    } catch (_error) {
      return null;
    }
  }

  function buildThemeData(details) {
    if (typeof LightweightThemeManager.themeDataFrom === "function") {
      return LightweightThemeManager.themeDataFrom(
        details,
        null,
        null,
        BASE_URI,
        THEME_ID,
        THEME_VERSION,
        null
      );
    }

    const styles = {
      id: THEME_ID,
      version: THEME_VERSION,
    };
    const colors = details?.colors || {};
    for (const [name, value] of Object.entries(colors)) {
      switch (name) {
        case "frame":
          styles.accentcolor = value;
          break;
        case "frame_inactive":
          styles.accentcolorInactive = value;
          break;
        case "tab_background_text":
          styles.textcolor = value;
          break;
        case "toolbar":
          styles.toolbarColor = value;
          break;
        case "toolbar_text":
        case "bookmark_text":
          styles.toolbar_text = value;
          break;
        case "icons":
          styles.icon_color = value;
          break;
        case "icons_attention":
          styles.icon_attention_color = value;
          break;
        default:
          styles[name] = value;
          break;
      }
    }

    const properties = details?.properties || {};
    if (properties.color_scheme) {
      styles.color_scheme = properties.color_scheme;
    }
    if (properties.content_color_scheme) {
      styles.content_color_scheme = properties.content_color_scheme;
    }

    return { theme: styles };
  }

  function applyLightweightTheme(details) {
    const themeData = buildThemeData(details);
    LightweightThemeManager.fallbackThemeData = themeData;
    Services.obs.notifyObservers(
      { wrappedJSObject: themeData },
      "lightweight-theme-styling-update"
    );
  }

  function syncZenPrefs(payload) {
    const mode = payload?.mode === "light" ? "light" : "dark";
    const themePref = mode === "dark" ? 0 : 1;

    Services.prefs.setBoolPref("zen.theme.disable-lightweight", false);
    Services.prefs.setIntPref("zen.view.window.scheme", themePref);
    Services.prefs.setIntPref(
      "layout.css.prefers-color-scheme.content-override",
      themePref
    );
    Services.prefs.setIntPref("browser.theme.toolbar-theme", themePref);
    Services.prefs.setIntPref("browser.theme.content-theme", themePref);

    if (payload?.palette?.blue) {
      Services.prefs.setStringPref("zen.theme.accent-color", payload.palette.blue);
    }
  }

  function buildSupplementalCss(palette, mode) {
    if (!palette) {
      return "";
    }

    const root = ':host(:is(.anonymous-content-host, notification-message)), :root';

    return `
      ${root} {
        color-scheme: ${mode} !important;
        --toolbar-color-scheme: ${mode} !important;
        --zen-primary-color: ${palette.blue} !important;
        --zen-branding-dark: ${palette.base} !important;
        --zen-branding-paper: ${palette.base} !important;
        --zen-branding-bg: ${palette.base} !important;
        --zen-branding-bg-reverse: ${palette.text} !important;
        --zen-colors-primary: ${palette.surface0} !important;
        --zen-colors-secondary: ${palette.surface1} !important;
        --zen-colors-tertiary: ${palette.mantle} !important;
        --zen-colors-hover-bg: ${palette.surface1} !important;
        --zen-colors-primary-foreground: ${palette.text} !important;
        --zen-colors-border: ${palette.surface2} !important;
        --zen-colors-border-contrast: ${palette.surface1} !important;
        --zen-colors-input-bg: ${palette.base} !important;
        --zen-dialog-background: ${palette.base} !important;
        --zen-urlbar-background: ${palette.base} !important;
        --zen-themed-toolbar-bg: ${palette.mantle} !important;
        --zen-themed-toolbar-bg-transparent: ${palette.mantle} !important;
        --zen-main-browser-background: ${palette.base} !important;
        --zen-main-browser-background-toolbar: ${palette.base} !important;
        --zen-toolbar-element-bg: ${palette.surface0} !important;
        --zen-toolbar-element-bg-hover: ${palette.surface1} !important;
        --toolbox-textcolor: ${palette.text} !important;
        --toolbar-bgcolor: ${palette.mantle} !important;
        --toolbar-color: ${palette.text} !important;
        --toolbar-field-background-color: ${palette.base} !important;
        --toolbar-field-color: ${palette.text} !important;
        --toolbar-field-border-color: ${palette.surface1} !important;
        --toolbar-field-focus-background-color: ${palette.surface0} !important;
        --toolbar-field-focus-color: ${palette.text} !important;
        --arrowpanel-background: ${palette.surface0} !important;
        --arrowpanel-color: ${palette.text} !important;
        --arrowpanel-border-color: ${palette.surface1} !important;
        --lwt-sidebar-background-color: ${palette.mantle} !important;
        --lwt-sidebar-text-color: ${palette.text} !important;
        --sidebar-background-color: ${palette.mantle} !important;
        --sidebar-text-color: ${palette.text} !important;
        --sidebar-border-color: ${palette.surface0} !important;
        --newtab-background-color: ${palette.base} !important;
        --newtab-background-color-secondary: ${palette.surface0} !important;
        --newtab-text-primary-color: ${palette.text} !important;
      }

      #TabsToolbar,
      hbox#titlebar,
      #zen-appcontent-navbar-container,
      #navigator-toolbox,
      #sidebar-box,
      #sidebar-main {
        background-color: ${palette.mantle} !important;
        color: ${palette.text} !important;
      }

      .urlbar-background,
      #zen-workspaces-button,
      .sidebar-placesTree,
      #urlbar[open]>.urlbarView,
      #tabbrowser-tabpanels,
      browser[type='content'] {
        background-color: ${palette.base} !important;
        color: ${palette.text} !important;
      }

      .content-shortcuts {
        background-color: ${palette.base} !important;
        border-color: ${palette.surface1} !important;
      }

      .urlbarView-url {
        color: ${palette.blue} !important;
      }

      .urlbarView-row,
      .urlbarView-row-inner,
      .urlbarView-title,
      .urlbarView-userContext,
      .urlbarView-results,
      #urlbar,
      #urlbar-input,
      #searchbar,
      #searchbar input {
        color: ${palette.text} !important;
      }

      #zenEditBookmarkPanelFaviconContainer {
        background: ${palette.crust} !important;
      }

      .identity-color-blue { --identity-tab-color: ${palette.blue} !important; --identity-icon-color: ${palette.blue} !important; }
      .identity-color-turquoise { --identity-tab-color: ${palette.teal} !important; --identity-icon-color: ${palette.teal} !important; }
      .identity-color-green { --identity-tab-color: ${palette.green} !important; --identity-icon-color: ${palette.green} !important; }
      .identity-color-yellow { --identity-tab-color: ${palette.yellow} !important; --identity-icon-color: ${palette.yellow} !important; }
      .identity-color-orange { --identity-tab-color: ${palette.peach} !important; --identity-icon-color: ${palette.peach} !important; }
      .identity-color-red { --identity-tab-color: ${palette.red} !important; --identity-icon-color: ${palette.red} !important; }
      .identity-color-pink { --identity-tab-color: ${palette.pink} !important; --identity-icon-color: ${palette.pink} !important; }
      .identity-color-purple { --identity-tab-color: ${palette.mauve} !important; --identity-icon-color: ${palette.mauve} !important; }

      @-moz-document url-prefix("about:") {
        :root {
          --in-content-page-background: ${palette.base} !important;
          --in-content-page-color: ${palette.text} !important;
          --color-accent-primary: ${palette.blue} !important;
          --in-content-box-background: ${palette.surface0} !important;
        }
      }

      @-moz-document url("about:newtab"), url("about:home") {
        :root {
          --newtab-background-color: ${palette.base} !important;
          --newtab-background-color-secondary: ${palette.surface0} !important;
          --newtab-element-hover-color: ${palette.surface0} !important;
          --newtab-text-primary-color: ${palette.text} !important;
          --newtab-wordmark-color: ${palette.text} !important;
          --newtab-primary-action-background: ${palette.blue} !important;
        }
      }

      @-moz-document url-prefix("about:preferences") {
        :root {
          --zen-colors-tertiary: ${palette.mantle} !important;
          --in-content-text-color: ${palette.text} !important;
          --link-color: ${palette.blue} !important;
          --zen-colors-primary: ${palette.surface0} !important;
          --in-content-box-background: ${palette.surface0} !important;
          --zen-primary-color: ${palette.blue} !important;
        }

        groupbox,
        moz-card {
          background: ${palette.base} !important;
        }

        button,
        groupbox menulist {
          background: ${palette.surface0} !important;
          color: ${palette.text} !important;
        }

        .main-content {
          background-color: ${palette.crust} !important;
        }
      }

      @-moz-document url-prefix("about:addons") {
        :root {
          --zen-dark-color-mix-base: ${palette.mantle} !important;
          --background-color-box: ${palette.base} !important;
        }
      }
    `;
  }

  function ensureTransitionSheet() {
    if (state.transitionSheetUri) return;
    const transitionCss = `
      *, *::before, *::after {
        transition: background-color 0.35s ease, color 0.35s ease,
                    border-color 0.35s ease, fill 0.35s ease,
                    stroke 0.35s ease, box-shadow 0.35s ease,
                    outline-color 0.35s ease !important;
      }
    `;
    state.transitionSheetUri = Services.io.newURI(
      "data:text/css;charset=UTF-8," + encodeURIComponent(transitionCss)
    );
    sss.loadAndRegisterSheet(state.transitionSheetUri, sss.USER_SHEET);
  }

  function applySupplementalCss(cssText) {
    // Ensure the transition sheet is always registered first
    ensureTransitionSheet();

    const oldSheetUri = state.currentSheetUri;
    state.currentSheetUri = null;

    if (cssText && cssText.trim()) {
      // Register new sheet BEFORE removing old — no gap means transitions work
      state.currentSheetUri = Services.io.newURI(
        "data:text/css;charset=UTF-8," + encodeURIComponent(cssText)
      );
      sss.loadAndRegisterSheet(state.currentSheetUri, sss.USER_SHEET);
    }

    // Now remove old sheet (new values already active, transition kicks in)
    try {
      if (oldSheetUri && sss.sheetRegistered(oldSheetUri, sss.USER_SHEET)) {
        sss.unregisterSheet(oldSheetUri, sss.USER_SHEET);
      }
    } catch (_error) {
      // Ignore stale stylesheet registration state.
    }
  }

  function applyTheme(payload) {
    if (!payload?.theme) {
      return;
    }

    syncZenPrefs(payload);
    applyLightweightTheme(payload.theme);
    applySupplementalCss(buildSupplementalCss(payload.palette, payload.mode === "light" ? "light" : "dark"));
  }

  function pollTheme() {
    const payload = readFile(THEME_PATH);
    if (payload) {
      applyTheme(payload);
    }
  }

  state.timerCallback = {
    notify: pollTheme,
  };
  state.timer = Cc["@mozilla.org/timer;1"].createInstance(Ci.nsITimer);
  state.timer.initWithCallback(
    state.timerCallback,
    400,
    Ci.nsITimer.TYPE_REPEATING_SLACK
  );

  pollTheme();
})();
