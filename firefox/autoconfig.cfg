// Jimdots Firefox live theme sync.
// Reads the shared Quickshell browser theme payload and applies it without restarting Firefox.

(function() {
  const globalStateKey = "__jimdotsFirefoxThemeSync";
  const existingState = this[globalStateKey];
  if (existingState?.timer) {
    existingState.timer.cancel();
  }

  const homeDir = Services.dirsvc.get("Home", Ci.nsIFile).path;
  const themePaths = [
    homeDir + "/.config/firefox-live-theme.json",
    homeDir + "/.config/zen-live-theme.json",
  ];

  const state = this[globalStateKey] = {
    lastText: existingState?.lastText || "",
    lastBuiltInThemeId: existingState?.lastBuiltInThemeId || "",
    currentSheetUri: existingState?.currentSheetUri || null,
    timer: null,
    timerCallback: null,
  };

  const sss = Cc["@mozilla.org/content/style-sheet-service;1"]
    .getService(Ci.nsIStyleSheetService);
  const { BuiltInThemes } = ChromeUtils.importESModule(
    "resource:///modules/BuiltInThemes.sys.mjs"
  );
  const { AddonManager } = ChromeUtils.importESModule(
    "resource://gre/modules/AddonManager.sys.mjs"
  );

  function readTextFile(path) {
    try {
      const file = Cc["@mozilla.org/file/local;1"].createInstance(Ci.nsIFile);
      file.initWithPath(path);
      if (!file.exists()) {
        return null;
      }

      const stream = Cc["@mozilla.org/network/file-input-stream;1"]
        .createInstance(Ci.nsIFileInputStream);
      stream.init(file, 0x01, 0, 0);

      const conv = Cc["@mozilla.org/intl/converter-input-stream;1"]
        .createInstance(Ci.nsIConverterInputStream);
      conv.init(stream, "UTF-8", 0, 0);

      let chunk = {};
      let text = "";
      while (conv.readString(4096, chunk) !== 0) {
        text += chunk.value;
      }

      conv.close();
      stream.close();
      return text;
    } catch (_error) {
      return null;
    }
  }

  function readPayload() {
    for (const path of themePaths) {
      const text = readTextFile(path);
      if (!text) {
        continue;
      }

      if (text === state.lastText) {
        return null;
      }

      try {
        const payload = JSON.parse(text);
        state.lastText = text;
        return payload;
      } catch (_error) {
        continue;
      }
    }

    return null;
  }

  function syncFirefoxPrefs(payload) {
    const mode = payload?.mode === "light" ? "light" : "dark";
    const themePref = mode === "dark" ? 0 : 1;

    Services.prefs.setIntPref(
      "layout.css.prefers-color-scheme.content-override",
      themePref
    );
    Services.prefs.setIntPref("browser.theme.toolbar-theme", themePref);
    Services.prefs.setIntPref("browser.theme.content-theme", themePref);
    Services.prefs.setBoolPref(
      "browser.theme.dark-private-windows",
      mode === "dark"
    );
  }

  async function syncBuiltInTheme(payload) {
    const themeId = payload?.mode === "light"
      ? "firefox-compact-light@mozilla.org"
      : "firefox-compact-dark@mozilla.org";

    if (
      themeId === state.lastBuiltInThemeId &&
      Services.prefs.getStringPref("extensions.activeThemeID", "") === themeId
    ) {
      return;
    }

    state.lastBuiltInThemeId = themeId;

    try {
      await BuiltInThemes.ensureBuiltInThemes();
      const addon = await AddonManager.getAddonByID(themeId);
      if (addon && !addon.isActive) {
        await addon.enable();
      }
    } catch (_error) {
      // Keep the CSS path working even if addon activation fails.
    }
  }

  function buildSupplementalCss(palette, mode) {
    if (!palette) {
      return "";
    }

    const selectedText = palette.base;
    return `
      :root {
        color-scheme: ${mode} !important;
        --toolbar-color-scheme: ${mode} !important;
        --lwt-accent-color: ${palette.crust} !important;
        --lwt-accent-color-inactive: ${palette.mantle} !important;
        --toolbox-bgcolor: ${palette.crust} !important;
        --toolbox-bgcolor-inactive: ${palette.mantle} !important;
        --toolbox-textcolor: ${palette.text} !important;
        --toolbox-textcolor-inactive: ${palette.text} !important;
        --toolbar-bgcolor: ${palette.surface0} !important;
        --toolbar-color: ${palette.text} !important;
        --tab-selected-bgcolor: ${palette.base} !important;
        --tab-selected-textcolor: ${palette.text} !important;
        --tab-loading-fill: ${palette.blue} !important;
        --lwt-tab-line-color: ${palette.blue} !important;
        --tabs-navbar-separator-color: ${palette.crust} !important;
        --chrome-content-separator-color: ${palette.crust} !important;
        --toolbarbutton-hover-background: ${palette.surface1} !important;
        --toolbarbutton-active-background: ${palette.surface2} !important;
        --toolbar-field-background-color: ${palette.base} !important;
        --toolbar-field-color: ${palette.text} !important;
        --toolbar-field-border-color: ${palette.surface1} !important;
        --toolbar-field-focus-background-color: ${palette.surface0} !important;
        --toolbar-field-focus-color: ${palette.text} !important;
        --arrowpanel-background: ${palette.surface0} !important;
        --arrowpanel-color: ${palette.text} !important;
        --arrowpanel-border-color: ${palette.surface1} !important;
        --urlbarView-highlight-background: ${palette.blue} !important;
        --urlbarView-highlight-color: ${selectedText} !important;
        --urlbarView-hover-background: ${palette.surface1} !important;
        --urlbarView-separator-color: ${palette.surface1} !important;
        --urlbarView-action-color: ${palette.subtext1} !important;
        --sidebar-background-color: ${palette.mantle} !important;
        --sidebar-text-color: ${palette.text} !important;
        --sidebar-border-color: ${palette.surface0} !important;
        --tabpanel-background-color: ${palette.base} !important;
        --newtab-background-color: ${palette.base} !important;
        --newtab-background-color-secondary: ${palette.surface0} !important;
        --newtab-element-hover-color: ${palette.surface0} !important;
        --newtab-text-primary-color: ${palette.text} !important;
        --button-background-color: ${palette.surface0} !important;
        --button-background-color-hover: ${palette.surface1} !important;
        --button-background-color-active: ${palette.surface2} !important;
      }

      #navigator-toolbox,
      #titlebar,
      #TabsToolbar,
      #nav-bar,
      #PersonalToolbar,
      #sidebar-box,
      #sidebar-header {
        background-color: ${palette.surface0} !important;
        color: ${palette.text} !important;
      }

      #sidebar-box,
      #sidebar-header,
      .sidebar-panel {
        background-color: ${palette.mantle} !important;
        color: ${palette.text} !important;
      }

      #urlbar[open] > .urlbarView,
      .urlbarView,
      .urlbarView-row,
      panel,
      menupopup {
        background-color: ${palette.surface0} !important;
        color: ${palette.text} !important;
      }

      #browser,
      #appcontent,
      #tabbrowser-tabbox,
      #tabbrowser-tabpanels,
      #tabbrowser-tabpanels browser[type='content'],
      browser[type='content-primary'] {
        background-color: ${palette.base} !important;
        color: ${palette.text} !important;
      }

      .urlbarView-url {
        color: ${palette.blue} !important;
      }

      .urlbarView-row-inner,
      .urlbarView-title,
      .urlbarView-userContext,
      .urlbarView-results,
      #urlbar,
      #urlbar-input,
      #searchbar,
      #searchbar input {
        color: ${palette.text} !important;
      }

      @-moz-document url-prefix("about:") {
        :root {
          --in-content-page-background: ${palette.base} !important;
          --in-content-page-color: ${palette.text} !important;
          --in-content-box-background: ${palette.surface0} !important;
          --in-content-border-color: ${palette.surface1} !important;
          --color-accent-primary: ${palette.blue} !important;
          --link-color: ${palette.blue} !important;
        }
      }

      @-moz-document url("about:newtab"), url("about:home") {
        :root {
          --newtab-background-color: ${palette.base} !important;
          --newtab-background-color-secondary: ${palette.surface0} !important;
          --newtab-element-hover-color: ${palette.surface0} !important;
          --newtab-text-primary-color: ${palette.text} !important;
          --newtab-wordmark-color: ${palette.text} !important;
          --newtab-primary-action-background: ${palette.blue} !important;
        }
      }

      @-moz-document url-prefix("about:preferences"), url-prefix("about:addons") {
        :root {
          --in-content-page-background: ${palette.base} !important;
          --in-content-page-color: ${palette.text} !important;
          --in-content-box-background: ${palette.surface0} !important;
        }

        groupbox,
        moz-card,
        .card {
          background: ${palette.surface0} !important;
        }

        button,
        menulist,
        input,
        textarea {
          background: ${palette.base} !important;
          color: ${palette.text} !important;
          border-color: ${palette.surface1} !important;
        }
      }
    `;
  }

  function applySupplementalCss(cssText) {
    try {
      if (state.currentSheetUri && sss.sheetRegistered(state.currentSheetUri, sss.USER_SHEET)) {
        sss.unregisterSheet(state.currentSheetUri, sss.USER_SHEET);
      }
    } catch (_error) {
      // Ignore stale stylesheet registration state.
    }

    state.currentSheetUri = null;
    if (!cssText || !cssText.trim()) {
      return;
    }

    state.currentSheetUri = Services.io.newURI(
      "data:text/css;charset=UTF-8," + encodeURIComponent(cssText)
    );
    sss.loadAndRegisterSheet(state.currentSheetUri, sss.USER_SHEET);
  }

  function applyTheme(payload) {
    if (!payload?.palette) {
      return;
    }

    syncFirefoxPrefs(payload);
    void syncBuiltInTheme(payload);
    applySupplementalCss(
      buildSupplementalCss(payload.palette, payload.mode === "light" ? "light" : "dark")
    );
  }

  function pollTheme() {
    const payload = readPayload();
    if (payload) {
      applyTheme(payload);
    }
  }

  state.timerCallback = {
    notify: pollTheme,
  };
  state.timer = Cc["@mozilla.org/timer;1"].createInstance(Ci.nsITimer);
  state.timer.initWithCallback(
    state.timerCallback,
    400,
    Ci.nsITimer.TYPE_REPEATING_SLACK
  );

  pollTheme();
})();
