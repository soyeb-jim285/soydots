# ── GPU SAFETY (hybrid AMD iGPU + NVIDIA GTX 1650) ─────────────────────────
# The NVIDIA dGPU on this laptop has BROKEN power management under nvidia-open:
#   nvidia-smi -> power.limit [N/A]; dmesg -> "NVRM ... failed to get platform
#   power mode / target temp from SBIOS". With a worn battery (~66% health) and
#   warm baseline temps, sustained dGPU load collapses the power rail and the
#   machine HARD-POWERS-OFF (no logs). Earlier a vulkan config routed mpv onto
#   the dGPU (it is the only Vulkan device present) and crashed the laptop mid-
#   video. So mpv MUST stay on the AMD iGPU only.
#
# vo=gpu-next over OpenGL (mesa) -> renders on the AMD iGPU via wayland EGL.
# Do NOT set gpu-api=vulkan: AMD has no Vulkan ICD (vulkan-radeon not installed),
# so vulkan would fall back to the NVIDIA dGPU and risk another hard poweroff.
vo=gpu-next
gpu-api=opengl

# Software decode (CPU). Safe: never touches a GPU video engine. Ryzen handles
# 1080p easily. To switch to AMD hardware decode later, install vulkan-radeon
# OR launch mpv with LIBVA_DRIVER_NAME=radeonsi and set hwdec=vaapi (the global
# LIBVA_DRIVER_NAME=nvidia from hyprland.conf otherwise misroutes vaapi).
hwdec=no

# ── Display tuning (kept light for the iGPU) ───────────────────────────────
profile=gpu-hq
dither-depth=auto
video-sync=audio

# ── Window / UX ────────────────────────────────────────────────────────────
keep-open=yes
save-position-on-quit=yes
force-window=immediate
cursor-autohide=1000

# ── Audio ──────────────────────────────────────────────────────────────────
ao=pipewire
volume=100
volume-max=150

# ── Subtitles ──────────────────────────────────────────────────────────────
sub-auto=fuzzy
sub-font-size=42
slang=eng,en
alang=jpn,jp,eng,en

# ── Screenshots ────────────────────────────────────────────────────────────
screenshot-format=png
screenshot-directory=~/Pictures/mpv

# ── OSD: uosc owns the UI, disable built-in OSC/bar ────────────────────────
osc=no
osd-bar=no
border=no
